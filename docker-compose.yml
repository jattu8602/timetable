services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: samayak
      POSTGRES_USER: samayak
      POSTGRES_PASSWORD: samayak_secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samayak -d samayak"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://samayak:samayak_secret@postgres:5432/samayak?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - AUTH_TRUST_HOST=true

volumes:
  pgdata:
